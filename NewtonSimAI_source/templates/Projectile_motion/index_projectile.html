<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matter.js Projectile Motion Simulation</title>
  <link rel="stylesheet" href="styles_projectile.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <header>
    <h1>Projectile Motion Simulation</h1>
  </header>

  <!-- Main container for simulation + graphs -->
  <main id="simulation-graphs-container">

    <!-- LEFT COLUMN: Simulation + controls -->
    <div id="simulation-controls">
      <!-- Simulation canvas -->
      <div id="scene"></div>

      <!-- Control panel -->
      <div id="controls">
        <div class="control-group">
          <label for="massInput">Ball Mass (kg):</label>
          <input type="number" id="massInput" value="10" min="0.1" step="0.1">
        </div>

        <div class="control-group">
          <label for="heightInput">Initial Height (m):</label>
          <input type="number" id="heightInput" value="0" min="0" step="1">
        </div>

        <div class="control-group">
          <label for="velocityInput">Initial Velocity (m/s):</label>
          <input type="number" id="velocityInput" value="50" min="0" step="1">
        </div>

        <div class="control-group">
          <label for="angleInput">Launch Angle (°):</label>
          <input type="number" id="angleInput" value="45" min="0" max="90" step="1">
        </div>




        <div class="control-group checkbox-group">
          <input type="checkbox" id="forceCheckbox" checked>
          <label for="forceCheckbox">Enable Forces</label>
        </div>

        <div class="control-group checkbox-group">
          <input type="checkbox" id="vectorCheckbox">
          <label for="vectorCheckbox">Enable Velocity Vector</label>
        </div>

        <div class="control-group checkbox-group">
          <input type="checkbox" id="motionCheckbox">
          <label for="motionCheckbox">Enable Motion Tracking</label>
        </div>

        <div class="control-group checkbox-group">
          <input type="checkbox" id="accelerationCheckbox">
          <label for="accelerationCheckbox">Enable Acceleration Vector</label>
        </div>

        <div class="control-group checkbox-group">
          <input type="checkbox" id="airCheckbox">
          <label for="airCheckbox">Enable Air Resistance</label>
        </div>

        <div class="control-group buttons">
          <!-- row 1: main buttons -->
          <div class="btn-row">
            <button id="pauseBtn">Pause</button>
            <button id="restartBtn">Restart</button>
            <button id="frameStartBtn">Start</button>
            <button id="frameApexBtn">Apex</button>
            <button id="frameEndBtn">End</button>
          </div>

          <!-- row 2: scrubber (left) + speed buttons (right) -->
          <div class="time-speed-row">
            <div class="scrub-wrap">
              <label for="timeScrubber">Time:</label>
              <input type="range" id="timeScrubber" min="0" max="10" step="0.01" value="0" />
            </div>

            <div class="speed-wrap" id="speedButtons">
              <button type="button" class="speed-btn" data-speed="0.25">0.25×</button>
              <button type="button" class="speed-btn" data-speed="0.5">0.5×</button>
              <button type="button" class="speed-btn" data-speed="0.75">0.75×</button>
              <button type="button" class="speed-btn" data-speed="1.0">1.0×</button>
              <button type="button" class="speed-btn" data-speed="1.25">1.25×</button>
              <button type="button" class="speed-btn" data-speed="1.5">1.5×</button>
              <button type="button" class="speed-btn" data-speed="1.75">1.75×</button>
              <button type="button" class="speed-btn" data-speed="2.0">2.0×</button>
            </div>
          </div>
        </div>



      </div>
    </div>

    <!-- RIGHT COLUMN: Graphs + Key -->
    <div id="graphs-container">
      <div class="graph-card"><canvas id="graph-x-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-y-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-vx-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-vy-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-Fg-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-Fn-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-Fg-m"></canvas></div>
      <div class="graph-card"><canvas id="graph-ax-t"></canvas></div>
      <div class="graph-card"><canvas id="graph-ay-t"></canvas></div>



      <!-- Key/Legend (below graphs) -->
      <div id="keyBox">
        <h3>Key</h3>

        <div id="keyForces" class="keySection">
          <h4>Forces</h4>
          <table class="keyTable">
            <tr>
              <td><span class="swatch fg"></span></td>
              <td>Gravity (N)</td>
            </tr>
            <tr>
              <td><span class="swatch fn"></span></td>
              <td>Normal (N)</td>
            </tr>
            <tr id="keyRowFd">
              <td><span class="swatch fd"></span></td>
              <td>Air Resistance (N)</td>
            </tr>
          </table>
        </div>

        <div id="keyVelocity" class="keySection">
          <h4>Velocity</h4>
          <table class="keyTable">
            <tr>
              <td><span class="swatch vx"></span></td>
              <td>X velocity (m/s)</td>
            </tr>
            <tr>
              <td><span class="swatch vy"></span></td>
              <td>Y velocity (m/s)</td>
            </tr>
            <tr>
              <td><span class="swatch v"></span></td>
              <td>Total velocity (m/s)</td>
            </tr>
          </table>
        </div>
        <div id="keyAcceleration" class="keySection">
          <h4>Acceleration</h4>
          <table class="keyTable">
            <tr>
              <td><span class="swatch ax"></span></td>
              <td>X acceleration (m/s²)</td>
            </tr>
            <tr>
              <td><span class="swatch ay"></span></td>
              <td>Y acceleration (m/s²)</td>
            </tr>
          </table>
        </div>
        
        <!-- === TIME SCRUBBER + SPEED CONTROLS === -->


        <div id="keyMotion" class="keySection">
          <h4>Motion Tracking</h4>
          <table class="keyTable">
            <tr>
              <td><span class="swatch x"></span></td>
              <td>X displacement (m)</td>
            </tr>
            <tr>
              <td><span class="swatch y"></span></td>
              <td>Y displacement (m)</td>
            </tr>
            <tr id="keyRowTrail">
              <td><span class="swatch trail"></span></td>
              <td>Total path (m)</td>
            </tr>
          </table>
        </div>
      </div>
    </div>

  </main>

  <!-- Matter.js library -->
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <!-- Your existing projectile logic -->
  <script src="./projectile.js"></script>
</body>

</html>
