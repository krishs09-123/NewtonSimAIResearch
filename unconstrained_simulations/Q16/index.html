<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projectile Simulation</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles_projectile.css" />
</head>
<body>

  <div id="app-wrapper">

    <!-- ─── LEFT: SIMULATION + CONTROLS ─── -->
    <div id="left-panel">

      <h1 id="main-title">Projectile Simulation</h1>

      <!-- Scene -->
      <div id="scene"></div>

      <!-- Scrubber -->
      <div id="scrubber-row">
        <input type="range" id="timeScrubber" min="0" max="1" step="0.01" value="0" />
        <span id="scrubberValue">0.00 s</span>
      </div>

      <!-- Playback controls -->
      <div id="controls-row">
        <div id="playback-group">
          <button id="pauseBtn">Pause</button>
          <button id="restartBtn">Restart</button>
        </div>
        <div id="frame-group">
          <span class="group-label">Freeze:</span>
          <button id="frameStartBtn">Start</button>
          <button id="frameApexBtn">Apex</button>
          <button id="frameEndBtn">End</button>
        </div>
        <div id="speedButtons">
          <span class="group-label">Speed:</span>
          <button class="speed-btn" data-speed="0.25">0.25×</button>
          <button class="speed-btn" data-speed="0.5">0.5×</button>
          <button class="speed-btn" data-speed="0.75">0.75×</button>
          <button class="speed-btn active" data-speed="1.0">1×</button>
          <button class="speed-btn" data-speed="1.25">1.25×</button>
          <button class="speed-btn" data-speed="1.5">1.5×</button>
          <button class="speed-btn" data-speed="1.75">1.75×</button>
          <button class="speed-btn" data-speed="2.0">2×</button>
        </div>
      </div>

      <!-- Parameters + Mode -->
      <div id="params-row">
        <div id="param-inputs">
          <label>Mass (kg) <input type="number" id="massInput" value="1" min="0.1" step="0.1" /></label>
          <label>Height (m) <input type="number" id="heightInput" value="10" min="0" step="1" /></label>
          <label>Speed (m/s) <input type="number" id="velocityInput" value="30" min="0" step="1" /></label>
          <label>Angle (°) <input type="number" id="angleInput" value="45" min="0" max="90" step="1" /></label>
        </div>
        <div id="mode-checks">
          <label><input type="checkbox" id="forceCheckbox" checked /> Forces</label>
          <label><input type="checkbox" id="vectorCheckbox" /> Velocity</label>
          <label><input type="checkbox" id="motionCheckbox" /> Motion</label>
          <label><input type="checkbox" id="accelerationCheckbox" /> Acceleration</label>
          <label><input type="checkbox" id="airCheckbox" disabled /> Air Drag (visual)</label>
        </div>
      </div>

      <!-- Key / Legend Box -->
      <div id="keyBox">
        <div id="keyForces">
          <table>
            <tr><td><span class="swatch" style="background:#e74c3c"></span></td><td>Fg (gravity)</td></tr>
            <tr><td><span class="swatch" style="background:#2ecc71"></span></td><td>Fn (normal)</td></tr>
            <tr id="keyRowFd" style="display:none"><td><span class="swatch" style="background:#f39c12"></span></td><td>Fd (drag, visual)</td></tr>
          </table>
        </div>
        <div id="keyVelocity" style="display:none">
          <table>
            <tr><td><span class="swatch" style="background:#3498db"></span></td><td>Vx</td></tr>
            <tr><td><span class="swatch" style="background:#9b59b6"></span></td><td>Vy</td></tr>
            <tr><td><span class="swatch" style="background:#1abc9c"></span></td><td>V (resultant)</td></tr>
          </table>
        </div>
        <div id="keyMotion" style="display:none">
          <table>
            <tr id="keyRowTrail"><td><span class="swatch" style="background:#e67e22"></span></td><td>Trail</td></tr>
            <tr><td><span class="swatch" style="background:#3498db"></span></td><td>Coordinates</td></tr>
          </table>
        </div>
      </div>

    </div>

    <!-- ─── RIGHT: GRAPHS ─── -->
    <div id="right-panel">

      <div id="wrap-Fg-t" class="graph-wrap"><canvas id="graph-Fg-t"></canvas></div>
      <div id="wrap-Fn-t" class="graph-wrap"><canvas id="graph-Fn-t"></canvas></div>
      <div id="wrap-Fg-m" class="graph-wrap"><canvas id="graph-Fg-m"></canvas></div>

      <div id="wrap-vx-t" class="graph-wrap"><canvas id="graph-vx-t"></canvas></div>
      <div id="wrap-vy-t" class="graph-wrap"><canvas id="graph-vy-t"></canvas></div>

      <div id="wrap-x-t" class="graph-wrap"><canvas id="graph-x-t"></canvas></div>
      <div id="wrap-y-t" class="graph-wrap"><canvas id="graph-y-t"></canvas></div>

      <div id="wrap-ax-t" class="graph-wrap"><canvas id="graph-ax-t"></canvas></div>
      <div id="wrap-ay-t" class="graph-wrap"><canvas id="graph-ay-t"></canvas></div>

    </div>

  </div>

  <!-- Matter.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <!-- App script -->
  <script src="projectile.js"></script>
</body>
</html>
